<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    overflow-x: hidden;
    overflow-y: auto;
}

.card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    max-width: 700px;
    width: 100%;
    overflow: hidden;
    animation: slideUp 0.8s ease-out;
    position: relative;
    margin: 20px 0;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card-header {
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: white;
    padding: 40px 20px 30px;
    text-align: center;
    position: relative;
    overflow: hidden;
}

.card-header::before {
    content: '👨‍👧‍👦';
    position: absolute;
    font-size: 100px;
    opacity: 0.1;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.card-header h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
}

.card-header p {
    font-size: 1.1rem;
    position: relative;
    z-index: 1;
}

.images-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 20px;
    background: #f8f9fa;
}

.image-frame {
    width: 100%;
    min-height: 250px;
    border-radius: 15px;
    overflow: hidden;
    background: #f5f5f5;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.image-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.message-section {
    padding: 30px 20px;
    text-align: center;
}

.message-section h2 {
    color: #764ba2;
    font-size: 1.5rem;
    margin-bottom: 15px;
}

.message-section p {
    color: #555;
    font-size: 1.1rem;
    line-height: 1.7;
    margin-bottom: 20px;
}

.signature {
    font-style: italic;
    color: #764ba2;
    font-size: 1.2rem;
}

.button-container {
    display: flex;
    gap: 10px;
    padding: 20px;
    background: #f8f9fa;
    justify-content: center;
    flex-wrap: wrap;
}

.btn {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: bold;
}

.btn-primary {
    background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
}

.btn-secondary {
    background: white;
    color: #764ba2;
    border: 2px solid #764ba2;
}

.btn-secondary:hover {
    background: #764ba2;
    color: white;
}

.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    pointer-events: none;
    z-index: 9999;
}

.particle {
    position: absolute;
    pointer-events: none;
}

/* MOBILE RESPONSIVE */

@media (max-width: 768px) {

    body {
        padding: 10px;
    }

    .card {
        width: 100%;
        border-radius: 15px;
    }

    .card-header {
        padding: 25px 15px;
    }

    .card-header h1 {
        font-size: 1.8rem;
    }

    .card-header p {
        font-size: 1rem;
    }

    .images-container {
        grid-template-columns: 1fr;
        gap: 15px;
        padding: 15px;
    }

    .image-frame {
        min-height: 300px;
    }

    .message-section {
        padding: 20px 15px;
    }

    .message-section h2 {
        font-size: 1.3rem;
    }

    .message-section p {
        font-size: 1rem;
    }

    .button-container {
        flex-direction: column;
        align-items: center;
    }

    .btn {
        width: 90%;
        max-width: 300px;
    }
}
</style>
